name: 发送更新公告到 Discord

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      custom_message:
        description: '自定义更新消息'
        required: false
        type: string

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取最新提交
        id: commits
        run: |
          # 获取最新提交信息（避免特殊字符问题）
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | tr -d '"' | tr -d "'")
          COMMIT_HASH=$(git log -1 --pretty=format:"%h")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ad" --date=short)
          
          # 使用环境变量传递
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          
          # 判断提交类型
          if [[ "$COMMIT_MSG" =~ ^(更新|新增|添加) ]]; then
            echo "type=update" >> $GITHUB_OUTPUT
            echo "emoji=🔄" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^修复 ]]; then
            echo "type=fix" >> $GITHUB_OUTPUT
            echo "emoji=🔧" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^新版本 ]]; then
            echo "type=version" >> $GITHUB_OUTPUT
            echo "emoji=📦" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^新功能 ]]; then
            echo "type=feature" >> $GITHUB_OUTPUT
            echo "emoji=✨" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^优化 ]]; then
            echo "type=optimize" >> $GITHUB_OUTPUT
            echo "emoji=⚡" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^美化 ]]; then
            echo "type=beautify" >> $GITHUB_OUTPUT
            echo "emoji=🎨" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^删除 ]]; then
            echo "type=delete" >> $GITHUB_OUTPUT
            echo "emoji=🗑️" >> $GITHUB_OUTPUT
          else
            echo "type=other" >> $GITHUB_OUTPUT
            echo "emoji=📝" >> $GITHUB_OUTPUT
          fi

      - name: 发送 Discord 通知
        uses: tsickert/discord-webhook@v5.0.0
        with:
          webhook-url: ${{ secrets.UPDATES_DISCORD_WEBHOOK }}
          content: |
            ${{ steps.commits.outputs.emoji }} **RP Chat 更新公告**
            
            **${{ steps.commits.outputs.commit_msg }}**
            
            📅 ${{ steps.commits.outputs.commit_date }}
            👤 ${{ steps.commits.outputs.commit_author }}
            🔗 [查看详情](https://github.com/${{ github.repository }}/commit/${{ steps.commits.outputs.commit_hash }})