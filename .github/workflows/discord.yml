# .github/workflows/discord.yml
name: Discord 更新通知

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 获取完整提交信息
        id: commit
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          
          # 提取第一行作为标题
          TITLE=$(echo "$COMMIT_MSG" | head -1)
          
          # 提取剩余部分作为描述（如果有）
          BODY=$(echo "$COMMIT_MSG" | tail -n +2 | head -30)
          
          # 截断过长的描述（Discord embed 描述限制 4096，但为了美观限制 500）
          if [ ${#BODY} -gt 500 ]; then
            BODY="${BODY:0:497}..."
          fi
          
          # 限制标题长度（Discord embed 标题限制 256）
          if [ ${#TITLE} -gt 100 ]; then
            TITLE="${TITLE:0:97}..."
          fi
          
          # 选择颜色和 emoji
          if echo "$TITLE" | grep -qiE "^(feat|feature|新增|添加)"; then
            COLOR=0x00FF00
            EMOJI="✨"
          elif echo "$TITLE" | grep -qiE "^(fix|修复)"; then
            COLOR=0xFFA500
            EMOJI="🔧"
          elif echo "$TITLE" | grep -qiE "^(refactor|重构)"; then
            COLOR=0x9B59B6
            EMOJI="♻️"
          elif echo "$TITLE" | grep -qiE "^(perf|优化)"; then
            COLOR=0x3498DB
            EMOJI="⚡"
          elif echo "$TITLE" | grep -qiE "^(style|美化|ui)"; then
            COLOR=0xE91E63
            EMOJI="🎨"
          elif echo "$TITLE" | grep -qiE "^(docs|文档)"; then
            COLOR=0x1ABC9C
            EMOJI="📝"
          elif echo "$TITLE" | grep -qiE "^(chore|杂项|工具)"; then
            COLOR=0x95A5A6
            EMOJI="🔧"
          elif echo "$TITLE" | grep -qiE "^(breaking|重大变更)"; then
            COLOR=0xFF0000
            EMOJI="⚠️"
          else
            COLOR=0x5865F2
            EMOJI="📦"
          fi
          
          # 输出到 GitHub 环境变量
          # 需要转义 JSON 特殊字符
          TITLE_ESCAPED=$(echo "$TITLE" | sed 's/"/\\"/g')
          BODY_ESCAPED=$(echo "$BODY" | sed 's/"/\\"/g')
          AUTHOR_ESCAPED=$(echo "$COMMIT_AUTHOR" | sed 's/"/\\"/g')
          
          echo "title=${TITLE_ESCAPED}" >> $GITHUB_OUTPUT
          echo "body=${BODY_ESCAPED}" >> $GITHUB_OUTPUT
          echo "author=${AUTHOR_ESCAPED}" >> $GITHUB_OUTPUT
          echo "url=${COMMIT_URL}" >> $GITHUB_OUTPUT
          echo "color=${COLOR}" >> $GITHUB_OUTPUT
          echo "emoji=${EMOJI}" >> $GITHUB_OUTPUT
          
      - name: 发送 Discord 通知
        env:
          DISCORD_WEBHOOK: ${{ secrets.UPDATES_DISCORD_WEBHOOK }}
          TITLE: ${{ steps.commit.outputs.title }}
          BODY: ${{ steps.commit.outputs.body }}
          AUTHOR: ${{ steps.commit.outputs.author }}
          URL: ${{ steps.commit.outputs.url }}
          COLOR: ${{ steps.commit.outputs.color }}
          EMOJI: ${{ steps.commit.outputs.emoji }}
        run: |
          # 构建描述
          if [ -n "$BODY" ]; then
            DESCRIPTION="${TITLE}\n\n${BODY}"
          else
            DESCRIPTION="${TITLE}"
          fi
          
          # 发送 Embed 格式的消息
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${EMOJI} RP Chat 更新\",
                \"description\": \"${DESCRIPTION}\",
                \"color\": ${COLOR},
                \"url\": \"${URL}\",
                \"author\": {
                  \"name\": \"${AUTHOR}\"
                },
                \"footer\": {
                  \"text\": \"RP Chat v1.0 | $(date -u +'%Y-%m-%d %H:%M UTC')\"
                },
                \"timestamp\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"
              }]
            }"