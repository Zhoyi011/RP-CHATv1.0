name: Discord 更新通知

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送 Discord 通知
        env:
          DISCORD_WEBHOOK: ${{ secrets.UPDATES_DISCORD_WEBHOOK }}
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          COMMIT_DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          # 选择 emoji 和颜色
          if echo "$COMMIT_MSG" | grep -qE "^(更新|新增|添加)"; then
            EMOJI="🔄"
            COLOR="3498db"
            TYPE="更新"
          elif echo "$COMMIT_MSG" | grep -q "^修复"; then
            EMOJI="🔧"
            COLOR="e67e22"
            TYPE="修复"
          elif echo "$COMMIT_MSG" | grep -q "^新版本"; then
            EMOJI="📦"
            COLOR="2ecc71"
            TYPE="版本发布"
          elif echo "$COMMIT_MSG" | grep -q "^新功能"; then
            EMOJI="✨"
            COLOR="9b59b6"
            TYPE="新功能"
          elif echo "$COMMIT_MSG" | grep -q "^优化"; then
            EMOJI="⚡"
            COLOR="1abc9c"
            TYPE="优化"
          elif echo "$COMMIT_MSG" | grep -q "^美化"; then
            EMOJI="🎨"
            COLOR="ff69b4"
            TYPE="美化"
          elif echo "$COMMIT_MSG" | grep -q "^删除"; then
            EMOJI="🗑️"
            COLOR="e74c3c"
            TYPE="移除"
          else
            EMOJI="📝"
            COLOR="95a5a6"
            TYPE="其他"
          fi
          
          # 使用 jq 构建 JSON（避免编码问题）
          JSON_DATA=$(jq -n \
            --arg msg "${COMMIT_MSG}" \
            --arg type "${TYPE}" \
            --arg author "${COMMIT_AUTHOR}" \
            --arg date "${COMMIT_DATE}" \
            --arg url "${COMMIT_URL}" \
            --arg emoji "${EMOJI}" \
            --argjson color "${COLOR}" \
            '{
              username: "RP Chat 更新机器人",
              avatar_url: "https://rp-chat-v1-0.vercel.app/favicon.svg",
              embeds: [{
                title: "\($emoji) RP Chat 更新公告",
                description: "**\($msg)**",
                color: $color,
                fields: [
                  {name: "📝 类型", value: $type, inline: true},
                  {name: "👤 作者", value: $author, inline: true},
                  {name: "📅 时间", value: $date, inline: true},
                  {name: "🔗 详情", value: "[点击查看](" + $url + ")", inline: false}
                ],
                footer: {
                  text: "RP Chat · 角色扮演聊天室",
                  icon_url: "https://rp-chat-v1-0.vercel.app/favicon.svg"
                },
                timestamp: (new Date()).toISOString()
              }]
            }')
          
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON_DATA"